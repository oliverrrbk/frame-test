    <!-- Tailwind bygges nu IND i appen (src/tailwind.css + tailwind.config.js).
         cdn.tailwindcss.com-scriptet er fjernet: det var runtime-afhængigt, dev-only
         og kunne blokeres af adblockere / CDN-nedetid → hele designet forsvandt. -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        .grid-pattern {
            background-image: linear-gradient(to right, rgba(171, 179, 183, 0.09) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(171, 179, 183, 0.09) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .text-balance {
            text-wrap: balance;
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Fang browserens "installer app"-event tidligt (det fyrer ofte før React er mountet),
         så vi kan tilbyde en rigtig ét-tryks-installation senere via pwaInstall.js. -->
    <script>
      window.__bisonInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__bisonInstallPrompt = e;
        window.dispatchEvent(new Event('bison-install-available'));
      });
      window.addEventListener('appinstalled', function () {
        window.__bisonInstallPrompt = null;
        window.dispatchEvent(new Event('bison-install-done'));
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
