name: Deploy Supabase Functions

# Deployer automatisk de edge-funktioner der er ændret, hver gang der pushes til main.
# Så skal ingen logge ind manuelt — og nye/ændrede push-funktioner ryger live af sig selv.
#
# Engangs-opsætning: tilføj repo-secret SUPABASE_ACCESS_TOKEN
#   (lav et token på https://supabase.com/dashboard/account/tokens
#    og indsæt det under Settings → Secrets and variables → Actions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: zjbjupovlgwlrvojusnr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ændrede funktioner
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD^"
          fi

          # Find hvilke funktions-mapper der er rørt (springer _shared over).
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'supabase/functions/**' \
            | awk -F/ '{print $3}' | sort -u | grep -v '^_shared$' || true)

          # Hvis kun delt kode (_shared) er ændret, redeploy push-funktionen som minimum.
          SHARED_CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'supabase/functions/_shared/**' || true)
          if [ -z "$CHANGED" ] && [ -n "$SHARED_CHANGED" ]; then
            CHANGED="send-push-reminders"
          fi

          if [ -z "$CHANGED" ]; then
            echo "Ingen funktions-ændringer at deploye."
            exit 0
          fi

          for fn in $CHANGED; do
            if [ -d "supabase/functions/$fn" ]; then
              # Funktioner markeret verify_jwt=false i config.toml (fx Stripe-webhook)
              # SKAL deployes med --no-verify-jwt, ellers afviser gatewayen eksterne
              # kald uden bruger-JWT (Stripe sender ingen).
              FLAG=""
              if awk -v f="[functions.$fn]" '$0==f{found=1;next} /^\[/{found=0} found && /verify_jwt[[:space:]]*=[[:space:]]*false/{print "yes";exit}' supabase/config.toml | grep -q yes; then
                FLAG="--no-verify-jwt"
              fi
              echo "→ Deployer $fn $FLAG"
              supabase functions deploy "$fn" --project-ref "$PROJECT_REF" $FLAG
            fi
          done
